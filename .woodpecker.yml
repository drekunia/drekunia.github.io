steps:
  build:
    image: jekyll/jekyll:latest
    commands:
      - chmod -R a+w .
      - bundle install
      - bundle exec jekyll build

  deploy:
    image: codeberg.org/sugar700/plugin-codeberg-pages-deploy:1
    settings:
      folder: _site
      ssh_key:
        from_secret: pages_deploy_key
    when:
      branch: main
      event: push